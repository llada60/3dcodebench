# Gemma 4 26B (a4b instruction-tuned) via Google AI Studio (Gemini API endpoint)
# Only thinking_level=high is supported by Gemma 4; off/low/medium/budget all
# return 400 INVALID_ARGUMENT. Run 3 seeds for trial spread.

api_key: ${GEMINI_API_KEY}  # set via env var (or replace this placeholder)

provider: gemini                       # uses google-genai SDK; Gemma 4 lives on the same endpoint
model: gemma-4-26b-a4b-it
temperature: 0.7
thinking: high                          # only "high" is accepted by Gemma 4
max_output_tokens: 16384

prompt_type: description
instances: null

max_workers: 50
overwrite: false
output_dir: null                        # caller fills via --output_dir per seed

rpm: 1000
tpm: 2000000
max_sweeps: 3
parse_retries: 3
