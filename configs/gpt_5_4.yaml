# Inference config for GPT-5.4 on the 3DProBench eval set.
# Pass to run_inference.py:  python run_inference.py --config config/gpt_5_4.yaml

provider: openai
api_key: ${GEMINI_API_KEY}  # set via env var (or replace this placeholder)

model: gpt-5.4
# GPT-5.x: temperature ignored (only 1 accepted); adapter omits it.
temperature: 1.0
thinking: medium                # mapped to reasoning_effort
max_output_tokens: 65536

prompt_type: description
instances: null

# Tier on this key: 5000 RPM, 1M TPM for 5.4/5.5. ~250s/call avg with
# medium thinking; 1M TPM provides plenty of room for 24 concurrent.
max_workers: 24
rpm: 2500
tpm: 900000
overwrite: false
output_dir: null
