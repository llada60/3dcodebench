# Inference config for GPT-5.5 Pro on the 3DProBench eval set.
# Pass to run_inference.py:  python run_inference.py --config config/gpt_5_5_pro.yaml
#
# IMPORTANT: gpt-5.5-pro is only available via OpenAI's /v1/responses
# endpoint, NOT /v1/chat/completions. The adapter routes models with
# "-pro" in the name to call_openai_responses() automatically.

# --- Auth ---
provider: openai
api_key: ${GEMINI_API_KEY}  # set via env var (or replace this placeholder)

# --- Model & generation ---
model: gpt-5.5-pro
# GPT-5.x: temperature ignored (only 1 accepted); adapter omits it.
temperature: 1.0
# pro models reject low / minimal / max — only medium / high / xhigh work.
# adapter remaps: minimal/low -> medium, max -> xhigh.
thinking: medium
max_output_tokens: 65536

# --- Eval scope ---
prompt_type: description
instances: null

# --- Runtime ---
# Pro is the slowest + most expensive OpenAI tier. Keep concurrency
# moderate to avoid 429 storms on a thinner per-account quota.
max_workers: 8
rpm: 500
tpm: 800000
overwrite: false
output_dir: null
